.deploy_template:
  stage: deploy
  variables:
    APP_PORT: "3000"
    CMS_PORT: "1337"
  before_script:
    - command -v rsync || true
  script:
    - echo "Deploying to $DEPLOY_PATH"

    # Sync frontend (include .env file)
    - sudo rsync -a --delete --exclude='node_modules' --exclude='.git' --exclude='src/i18n' $BUILD_PATH/source/ $DEPLOY_PATH/

    # Sync strapi (include .env file)
    # - |
    #   if [ -d "$DEPLOY_PATH/cms/.strapi" ]; then
    #     echo "Strapi exists, skipping sync..."
    #   else
    #     echo "Strapi does not exist, syncing..."
    #     sudo rsync -a --delete --exclude='node_modules' --exclude='.git' --exclude='.tmp/' --exclude='public/uploads/' $BUILD_PATH/source/cms/ $DEPLOY_PATH/cms/
    #   fi

    # Change ownership
    - sudo chown ${OWNER}:${OWNER} -R ${DEPLOY_PATH}

    # Restart services with PM2
    - |
      sudo -u ${OWNER} bash -c "
        export NVM_DIR=\$HOME/.nvm;
        source \$NVM_DIR/nvm.sh;

        cd $DEPLOY_PATH
        pm2 delete frontend || true
        PORT=$APP_PORT NODE_ENV=production pm2 start npm --name frontend -- run start

        # cd $DEPLOY_PATH/cms
        # pm2 delete cms || true
        # PORT=$CMS_PORT NODE_ENV=production pm2 start npm --name cms -- run start

        pm2 save
        "

deploy_develop:
  extends: .deploy_template
  needs: ["build_frontend_dev"]
  tags:
    - dev
  rules:
    - if: '$CI_COMMIT_BRANCH == "develop"'
  variables:
    DEPLOY_PATH: "/home/boilerplatedev/public_html"
    OWNER: "boilerplatedev"

deploy_master:
  extends: .deploy_template
  needs: ["build_frontend_prod"]
  tags:
    - prod
  rules:
    - if: '$CI_COMMIT_BRANCH == "master"'
  variables:
    DEPLOY_PATH: "/home/boilerplate/public_html"
    OWNER: "boilerplate"
  when: manual
