stages:
  - source
  - build
  - deploy

variables:
  BUILD_PATH: "/home/gitlab-runner/private"
  DB_PORT: "3306"

.get_source_template:
  stage: source
  script:
    - echo "Cleaning old build..."
    - rm -rf $BUILD_PATH/*
    - mkdir -p $BUILD_PATH
    - cd $BUILD_PATH

    # Clone repo into build path
    - git clone $CI_REPOSITORY_URL source
    - cd source
    - git checkout $CI_COMMIT_BRANCH

get_source_dev:
  extends: .get_source_template
  tags:
    - dev
  rules:
    - if: '$CI_COMMIT_BRANCH == "develop"'

get_source_prod:
  extends: .get_source_template
  tags:
    - prod
  rules:
    - if: '$CI_COMMIT_BRANCH == "master"'

.build_frontend_template:
  stage: build
  before_script:
    - command -v rsync || true
    - export NVM_DIR="$HOME/.nvm"
    - source "$NVM_DIR/nvm.sh"
    # Create .env file for the deployment
    - |
      cd $BUILD_PATH/source
      if [ "$CI_COMMIT_BRANCH" == "develop" ]; then
        cat > .env << EOF
      # Database Configuration
      # DATABASE_URL=${DATABASE_URL_STAGING}

      # Next.js Configuration
      # NEXTAUTH_URL=https://boilerplate.dev.wp-propel.com
      # NEXTAUTH_SECRET=${NEXTAUTH_SECRET}

      # Strapi Configuration
      # STRAPI_API_URL=http://localhost:1337
      # STRAPI_API_TOKEN=${STRAPI_API_TOKEN}

      # GraphQL Configuration
      GRAPHQL_ENDPOINT=${GRAPHQL_ENDPOINT}
      GRAPHQL_API_KEY=${GRAPHQL_API_KEY}
      GRAPHQL_ORDER_EDITOR_API_KEY=${GRAPHQL_ORDER_EDITOR_API_KEY}
      GRAPHQL_TIMEOUT=30000

      # MAILJET_API_KEY=${MAILJET_API_KEY}
      # MAILJET_SECRET_KEY=${MAILJET_SECRET_KEY}
      # SENDER_EMAIL=${SENDER_EMAIL}
      # SENDER_NAME=${SENDER_NAME}

      EOF
      else
        cat > .env << EOF
      # Database Configuration
      DATABASE_URL=${DATABASE_URL}

      # Next.js Configuration
      NEXTAUTH_URL=https://boilerplate.prod.wp-propel.com
      NEXTAUTH_SECRET=${NEXTAUTH_SECRET}

      # Strapi Configuration
      STRAPI_API_URL=http://localhost:$CMS_PORT
      STRAPI_API_TOKEN=${STRAPI_API_TOKEN}

      # GraphQL Configuration
      GRAPHQL_ENDPOINT=${GRAPHQL_ENDPOINT}
      GRAPHQL_API_KEY=${GRAPHQL_API_KEY}
      GRAPHQL_ORDER_EDITOR_API_KEY=${GRAPHQL_ORDER_EDITOR_API_KEY}
      GRAPHQL_TIMEOUT=30000

      MAILJET_API_KEY=${MAILJET_API_KEY}
      MAILJET_SECRET_KEY=${MAILJET_SECRET_KEY}
      SENDER_EMAIL=${SENDER_EMAIL}
      SENDER_NAME=${SENDER_NAME}

      EOF
      fi

      # Copy .env to cms directory as well
      # cp .env cms/.env

      echo "Created .env file for $CI_COMMIT_BRANCH environment"
      echo "Environment file contents (masked):"
      sed 's/=.*/=***MASKED***/' .env
      fi

      echo "Created .env file for $CI_COMMIT_BRANCH environment"
      echo "Environment file contents (masked):"
      sed 's/=.*/=***MASKED***/' .env
  rules:
    - if: '$CI_COMMIT_BRANCH == "develop"'
    - if: '$CI_COMMIT_BRANCH == "master"'
  script:
    # Build frontend
    - cd $BUILD_PATH/source
    - npm ci --no-audit --no-fund --include=dev
    - NODE_ENV=production npm run build

build_frontend_dev:
  extends: .build_frontend_template
  needs: ["get_source_dev"]
  tags:
    - dev
  rules:
    - if: '$CI_COMMIT_BRANCH == "develop"'

build_frontend_prod:
  extends: .build_frontend_template
  needs: ["get_source_prod"]
  tags:
    - prod
  rules:
    - if: '$CI_COMMIT_BRANCH == "master"'

