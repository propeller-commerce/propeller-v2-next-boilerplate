stages:
  - source
  - build
  - deploy
  - mirror
  - release

getSource:
  stage: source
  script:
    - devbox run get-source

buildFrontend:
  stage: build
  needs: ["getSource"]
  script:
    - devbox run build-frontend

buildCMS:
  stage: build
  needs: ["getSource"]
  script:
    - devbox run build-cms

deploy:
  stage: deploy
  needs: ["buildFrontend", "buildCMS"]
  variables:
    USER: "boilerplate"
  script:
    - sudo -u ${USER} bash -c "cd /home/${USER}/public_html; devbox run deploy"

# -- Stage: mirror ------------------------------------------------------------
# One-way, SCRUBBED mirror of develop/master to the PUBLIC GitHub repo.
#
# This boilerplate tracks private development files (Claude config/skills,
# CLAUDE.md, deploy Taskfile) that must NEVER reach the public mirror. Rather
# than rewrite GitLab history, the job builds an ephemeral scrubbed commit in
# the CI runner and force-pushes THAT to GitHub. GitLab branches are never
# pushed to and remain untouched.
#
# Requires CI/CD variable GITHUB_TOKEN (repo scope), Masked + Protected.
mirror_to_github:
  stage: mirror
  # Decouple from the deploy pipeline: an empty `needs` makes this job start
  # immediately at pipeline creation instead of waiting for the source/build/
  # deploy stages (which run `devbox` on self-hosted runners and may not run
  # on every push). The mirror must publish regardless of the deploy outcome.
  needs: []
  image:
    name: alpine/git:latest
    entrypoint: [""]
  only:
    - develop
    - master
    - main
  before_script:
    - git --version
  script:
    - echo "Mirroring to GitHub (scrubbed)..."
    - git config --global user.email "ci@propeller-commerce.com"
    - git config --global user.name "GitLab CI"
    - git remote add github https://${GITHUB_TOKEN}@github.com/propeller-commerce/propeller-v2-next-boilerplate.git || true
    - git fetch origin --unshallow || git fetch origin || true
    - git rm -r --cached --ignore-unmatch .claude CLAUDE.md frontend/CLAUDE.md memory Taskfile.yml >/dev/null 2>&1 || true
    - 'git commit -m "chore(mirror): strip private dev files for public mirror" --no-verify || echo "nothing to scrub"'
    - git push --no-thin github HEAD:refs/heads/master --force
    - git push --no-thin github --tags --force
  when: on_success
  allow_failure: false

# -- Stage: release ------------------------------------------------------------
# Automatic GitHub Release, driven from GitLab (the source of truth), cut on
# the mirrored commit. Idempotent + Unreleased-gated, identical contract to the
# UI packages. Reuses GITHUB_TOKEN.
release_to_github:
  stage: release
  image:
    name: alpine/git:latest
    entrypoint: [""]
  only:
    - master
    - main
  needs:
    - mirror_to_github
  before_script:
    - apk add --no-cache jq curl >/dev/null 2>&1 || true
  script:
    - echo "Evaluating release gate..."
    - VERSION=$(sed -n 's/.*"version"[[:space:]]*:[[:space:]]*"\([^"]*\)".*/\1/p' package.json | head -n1)
    - 'echo "package.json version: ${VERSION}"'
    - test -n "$VERSION" || { echo "Could not parse version; aborting."; exit 1; }
    - TAG="v${VERSION}"
    - git remote add github https://${GITHUB_TOKEN}@github.com/propeller-commerce/propeller-v2-next-boilerplate.git || true
    - |
      if git ls-remote --tags github "refs/tags/${TAG}" | grep -q "${TAG}"; then
        echo "Tag ${TAG} already on GitHub - release already cut, nothing to do.";
        exit 0;
      fi
    - |
      if grep -Eiq "^##[[:space:]]*\[${VERSION}\][^\n]*unreleased" CHANGELOG.md; then
        echo "CHANGELOG marks ${VERSION} as Unreleased - skipping release per policy.";
        exit 0;
      fi
    - |
      awk -v ver="$VERSION" '
        $0 ~ ("^## [[]" ver "[]]") {grab=1; next}
        grab && $0 ~ "^## [[]" {exit}
        grab {print}
      ' CHANGELOG.md > RELEASE_BODY.md
    - test -s RELEASE_BODY.md || { echo "Empty CHANGELOG section for ${VERSION}; aborting."; exit 1; }
    - 'echo "--- release body ---"; cat RELEASE_BODY.md'
    - git config --global user.email "ci@propeller-commerce.com"
    - git config --global user.name "GitLab CI"
    - git tag -a "${TAG}" -m "Release ${TAG}" || true
    - git push --no-thin github "refs/tags/${TAG}"
    - |
      PAYLOAD=$(jq -n --arg tag "$TAG" --arg name "$TAG" \
        --rawfile body RELEASE_BODY.md \
        '{tag_name:$tag, name:$name, body:$body, draft:false, prerelease:false}')
      HTTP=$(curl -sS -o resp.json -w "%{http_code}" -X POST \
        -H "Authorization: token ${GITHUB_TOKEN}" \
        -H "Accept: application/vnd.github+json" \
        https://api.github.com/repos/propeller-commerce/propeller-v2-next-boilerplate/releases \
        -d "$PAYLOAD")
      echo "GitHub API HTTP ${HTTP}"; cat resp.json
      case "$HTTP" in 2*) echo "Release ${TAG} created.";; *) echo "Release API call failed."; exit 1;; esac
  when: on_success
  allow_failure: true
