version: "3"

vars:
  # GitLab CI predefined variables will be available in the environment
  BUILD_PATH: '{{.BUILD_PATH | default "/home/gitlab-runner/private"}}'
  APP_PORT: '{{.APP_PORT | default "3000"}}'
  CI_COMMIT_BRANCH: "{{.CI_COMMIT_BRANCH}}"
  CI_REPOSITORY_URL: "{{.CI_REPOSITORY_URL}}"
  DEPLOY_PATH: "/home/boilerplate/public_html"
  OWNER: "boilerplate"

tasks:
  get-source:
    desc: "Clones the repository into the build path."
    cmds:
      - echo "Cleaning old build..."
      - sudo rm -rf {{.BUILD_PATH}}/*
      - echo "Getting source..."
      - mkdir -p {{.BUILD_PATH}}
      - git clone {{.CI_REPOSITORY_URL}} {{.BUILD_PATH}}/source
      - cd {{.BUILD_PATH}}/source && git checkout {{.CI_COMMIT_BRANCH}}

  build-frontend:
    desc: "Builds the frontend application."
    dir: "{{.BUILD_PATH}}/source"
    cmds:
      - set -e
      - npm ci --no-audit --no-fund --include=dev
      - npm run build
      - echo "Copying files to {{.DEPLOY_PATH}}"
      - sudo rsync -a --delete --exclude='.git' --exclude='src/i18n' {{.BUILD_PATH}}/source/ {{.DEPLOY_PATH}}/
      - sudo chown {{.OWNER}}:{{.OWNER}} -R {{.DEPLOY_PATH}}

  deploy:
    desc: "Deploying the application."
    dir: "{{.DEPLOY_PATH}}"
    cmds:
      - pm2 delete frontend || true
      - unset name; PORT={{.APP_PORT}} pm2 start npm --name frontend -- run dev -- --hostname 127.0.0.1
      - pm2 save

  start:
    desc: "Starting the application."
    dir: "{{.DEPLOY_PATH}}"
    cmds:
      - unset name; PORT={{.APP_PORT}} pm2 start npm --name frontend -- run dev -- --hostname 127.0.0.1

  stop:
    desc: "Stopping the application."
    dir: "{{.DEPLOY_PATH}}"
    cmds:
      - pm2 delete frontend || true
